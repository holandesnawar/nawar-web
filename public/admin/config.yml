# ─────────────────────────────────────────────────
# Decap CMS config — Holandés Nawar
# ─────────────────────────────────────────────────

backend:
  name: github
  repo: holandesnawar/nawar-web
  branch: main
  base_url: https://www.holandesnawar.com
  auth_endpoint: api/auth

commit_messages:
  create: "content: crea {{collection}} \"{{slug}}\""
  update: "content: actualiza {{collection}} \"{{slug}}\""
  delete: "content: elimina {{collection}} \"{{slug}}\""
  uploadMedia: "content: sube imagen \"{{path}}\""
  deleteMedia: "content: elimina imagen \"{{path}}\""

media_folder: "public/blog/images"
public_folder: "/blog/images"

publish_mode: simple
site_url: https://www.holandesnawar.com
logo_url: https://d1yei2z3i6k35z.cloudfront.net/9533860/671a9c9265e23_Logo_Nawar_2.png
locale: es

collections:

  # ── BLOG ──────────────────────────────────────────
  - name: "blog"
    label: "📝 Blog"
    label_singular: "artículo"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "blog/{{slug}}"
    summary: "{{title}} — {{publishedAt | date('DD/MM/YYYY')}}"
    sortable_fields: ['publishedAt', 'title']
    view_groups:
      - label: Categoría
        field: category
    fields:
      - { label: "Título",    name: "title",       widget: "string" }
      - { label: "Fecha",     name: "publishedAt", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm", format: "YYYY-MM-DDTHH:mm:ss.SSSZ" }
      - { label: "Extracto (máx 200 car.)", name: "excerpt", widget: "text", required: false }
      - label: "Categoría"
        name: "category"
        widget: "select"
        required: false
        options:
          - { label: "Inburgering",   value: "inburgering" }
          - { label: "Cultura",       value: "cultura" }
          - { label: "Vocabulario",   value: "vocabulario" }
          - { label: "Pronunciación", value: "pronunciacion" }
      - label: "Imagen principal"
        name: "mainImage"
        widget: "object"
        required: false
        collapsed: false
        fields:
          - { label: "Imagen",      name: "src", widget: "image" }
          - { label: "Texto alt.", name: "alt", widget: "string", required: false }
      - { label: "Minutos de lectura", name: "readingMinutes", widget: "number", required: false, default: 3, value_type: "int", min: 1, max: 60 }
      - label: "SEO (opcional)"
        name: "seo"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Meta título",      name: "title",       widget: "string", required: false }
          - { label: "Meta descripción", name: "description", widget: "text",   required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }

  # ── HOME / LANDING ────────────────────────────────
  - name: "landing"
    label: "🏠 Home / Landing"
    files:
      - label: "Contenido de la home"
        name: "home"
        file: "src/data/landing.json"
        format: "json"
        fields:

          # ─── Hero (banner superior) ───
          - label: "Hero (banner azul de inicio)"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Pill superior",                 name: "badge",      widget: "string" }
              - { label: "Título — línea 1 (blanca)",     name: "titleLine1", widget: "string" }
              - { label: "Título — línea 2 (azul claro)", name: "titleLine2", widget: "string" }
              - { label: "Subtítulo",                     name: "subtitle",   widget: "text" }
              - label: "Bullets (3 ítems)"
                name: "bullets"
                widget: "list"
                field: { label: "Bullet", name: "bullet", widget: "string" }
              - { label: "Texto del botón CTA", name: "ctaText", widget: "string" }

          # ─── Por qué existe Nawar ───
          - label: "Por qué existe Nawar"
            name: "porQueNawar"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Pill",      name: "badge",    widget: "string" }
              - { label: "Título (usa \\n para salto)", name: "title", widget: "string" }
              - { label: "Subtítulo", name: "subtitle", widget: "text" }
              - { label: "Título tarjeta izquierda (roja)",  name: "leftCardTitle",  widget: "string" }
              - label: "Ítems tarjeta izquierda"
                name: "leftCardItems"
                widget: "list"
                field: { label: "Ítem", name: "item", widget: "string" }
              - { label: "Título tarjeta derecha (Nawar)",   name: "rightCardTitle", widget: "string" }
              - label: "Ítems tarjeta derecha"
                name: "rightCardItems"
                widget: "list"
                field: { label: "Ítem", name: "item", widget: "string" }

          # ─── Proceso (Dos clics, Listo) ───
          - label: "Sección 'Así de sencillo'"
            name: "proceso"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Pill",              name: "badge",          widget: "string" }
              - { label: "Título",            name: "title",          widget: "string" }
              - { label: "Subtítulo",         name: "subtitle",       widget: "text" }
              - { label: "Texto de garantía", name: "guaranteeText",  widget: "string" }
              - { label: "Texto del CTA",     name: "ctaText",        widget: "string" }

          # ─── Valor ───
          - label: "Sección 'Prepárate para el cambio'"
            name: "valor"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Pill",             name: "badge",        widget: "string" }
              - { label: "Título línea 1",   name: "titleLine1",   widget: "string" }
              - { label: "Título línea 2 (azul claro)", name: "titleLine2", widget: "string" }
              - { label: "Subtítulo",        name: "subtitle",     widget: "text" }
              - { label: "Frase final con flecha", name: "note",   widget: "string" }
              - { label: "CTA primario",     name: "ctaPrimary",   widget: "string" }
              - { label: "CTA secundario",   name: "ctaSecondary", widget: "string" }

          # ─── Comparison (Nawar vs clásicas) ───
          - label: "Comparación Nawar vs academias clásicas"
            name: "comparison"
            widget: "list"
            summary: "{{fields.icon}} {{fields.title}}"
            fields:
              - { label: "Icono / emoji",  name: "icon",        widget: "string" }
              - { label: "Título",         name: "title",       widget: "string" }
              - { label: "Texto Nawar",    name: "nawarText",   widget: "text" }
              - { label: "Texto clásicas", name: "classicText", widget: "text" }

          # ─── Para quién ───
          - label: "¿Para quién está diseñado?"
            name: "paraQuien"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Pill",      name: "badge",    widget: "string" }
              - { label: "Subtítulo (usa \\n para saltos)", name: "subtitle", widget: "text" }
              - label: "Puntos (perfiles)"
                name: "points"
                widget: "list"
                summary: "{{fields.icon}} {{fields.title}}"
                fields:
                  - { label: "Icono",       name: "icon",        widget: "string" }
                  - { label: "Título",      name: "title",       widget: "string" }
                  - { label: "Descripción", name: "description", widget: "text" }

          # ─── FAQ ───
          - label: "Preguntas frecuentes"
            name: "faq"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Pill",   name: "badge", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - label: "Preguntas / respuestas"
                name: "items"
                widget: "list"
                summary: "{{fields.question}}"
                fields:
                  - { label: "Pregunta",  name: "question", widget: "string" }
                  - { label: "Respuesta", name: "answer",   widget: "text" }

          # ─── Testimonios ───
          - label: "Testimonios"
            name: "testimonials"
            widget: "list"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: "Nombre",        name: "name",  widget: "string" }
              - { label: "Ubicación/rol", name: "role",  widget: "string", required: false, hint: "Ej: La Haya, Países Bajos" }
              - { label: "Foto (URL)",    name: "photo", widget: "string", required: false, hint: "URL completa de la imagen" }
              - { label: "Estrellas",     name: "stars", widget: "number", value_type: "int", min: 1, max: 5, default: 5 }
              - { label: "Título corto",  name: "title", widget: "string", required: false, hint: "Ej: Por fin entiendo a mis vecinos" }
              - { label: "Testimonio",    name: "text",  widget: "text" }
